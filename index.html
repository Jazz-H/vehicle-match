<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --steel-900:#1b1f24; --steel-850:#22272d; --steel-800:#282e35; --steel-700:#343b43;
    --paper:#ece9e0; --paper-dim:#e1ddd1; --paper-edge:#d4cfc1;
    --ink:#1a1d21; --ink-soft:#565b62; --ink-faint:#8a8e93;
    --redline:#d83a29; --redline-deep:#b02c1d; --amber:#e0a012;
    --line:rgba(26,29,33,.14); --line-strong:rgba(26,29,33,.28);
    --line-steel:rgba(255,255,255,.09); --line-steel-strong:rgba(255,255,255,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{background:
      radial-gradient(120% 80% at 50% -10%, #23282f 0%, var(--steel-900) 55%) fixed;
    color:var(--paper);font-family:"IBM Plex Sans",system-ui,sans-serif;min-height:100vh;
    display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
  a{color:inherit;}

  /* ---------- header ---------- */
  .topbar{position:sticky;top:0;z-index:20;background:rgba(24,28,33,.85);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line-steel);padding-top:env(safe-area-inset-top);}
  .topbar-in{max-width:1080px;margin:0 auto;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .wordmark{font-family:"Saira Condensed",sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.11em;
    font-size:.98rem;display:flex;align-items:center;gap:9px;color:var(--paper);text-decoration:none;}
  .wordmark::before{content:"";width:14px;height:15px;background:var(--redline);
    clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);flex:0 0 auto;}
  .wordmark span{color:var(--ink-faint);font-weight:600;letter-spacing:.14em;font-size:.62rem;}
  .topbar-tag{font-family:"IBM Plex Mono",monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);}

  main{flex:1;width:100%;max-width:1080px;margin:0 auto;padding:0 20px 60px;}

  /* ---------- landing (editorial stack on mobile → framed split on desktop) ---------- */
  .landing{width:100%;}
  .frame{position:relative;padding:6px 0 36px;}
  .tick,.meta{display:none;}                     /* instrument-panel chrome: desktop only */

  .kicker{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap;}
  .kicker .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:.66rem;letter-spacing:.2em;
    text-transform:uppercase;color:var(--amber);white-space:nowrap;}
  .kicker .kline{flex:1;height:1px;background:var(--line-steel);max-width:220px;min-width:24px;}
  .kicker .kidx{font-family:"IBM Plex Mono",monospace;font-size:.6rem;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink-faint);}

  .lead h1{font-family:"Saira Condensed",sans-serif;font-weight:800;text-transform:uppercase;
    line-height:.86;letter-spacing:.004em;font-size:clamp(3.7rem,12.5vw,5rem);margin-left:-.03em;}
  .lead h1 .rev{color:var(--redline);}
  .lead .sub{max-width:42ch;margin:26px 0 30px;color:#c8c4ba;font-size:1.06rem;line-height:1.5;}
  .cta-row{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .cta-note{font-family:"IBM Plex Mono",monospace;font-size:.66rem;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink-faint);}

  .payoff{display:none;}                          /* sample match card: desktop only */

  /* sample match card (namespaced sc- so it never touches the results .card) */
  .samplecard{background:var(--paper);color:var(--ink);border-radius:16px;overflow:hidden;
    border:1px solid var(--paper-edge);box-shadow:0 40px 80px -34px rgba(0,0,0,.85);}
  .sc-flag{background:var(--redline);color:#fff;font-family:"IBM Plex Mono",monospace;font-size:.6rem;
    letter-spacing:.18em;text-transform:uppercase;font-weight:600;padding:8px 18px;}
  .sc-visual{background:linear-gradient(160deg,#2a3138,#171a1e);display:flex;align-items:center;justify-content:center;padding:26px;min-height:172px;}
  .sc-visual svg{width:74%;max-width:250px;color:#aeb4bb;}
  .sc-info{padding:20px 22px 6px;}
  .sc-info .sc-ey{font-family:"IBM Plex Mono",monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);}
  .sc-info h3{font-family:"Saira Condensed",sans-serif;font-weight:800;text-transform:uppercase;font-size:2rem;line-height:1;margin:4px 0 8px;}
  .sc-badge{display:inline-flex;align-items:baseline;gap:6px;background:var(--ink);color:var(--paper);border-radius:999px;padding:6px 14px;margin-bottom:12px;}
  .sc-badge b{font-family:"Saira Condensed",sans-serif;font-weight:800;font-size:1.2rem;}
  .sc-badge span{font-family:"IBM Plex Mono",monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;}
  .sc-why{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
  .sc-why span{font-family:"IBM Plex Mono",monospace;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;font-weight:600;
    color:#8a5a00;background:#fbf3df;border:1px solid #efd9a6;border-radius:999px;padding:5px 11px;}
  .sc-specs{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line);}
  .sc-specs .s{padding:11px 14px;border-right:1px solid var(--line);}
  .sc-specs .s:last-child{border-right:none;}
  .sc-specs .k{font-family:"IBM Plex Mono",monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:3px;}
  .sc-specs .v{font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:1.05rem;}

  /* value strip (stacked on mobile, 3-up on desktop) */
  .vstrip{border-top:1px solid var(--line-steel);display:grid;grid-template-columns:1fr;margin-top:34px;}
  .vcell{padding:22px 2px;border-bottom:1px solid var(--line-steel);}
  .vcell:last-child{border-bottom:none;}
  .vcell .vn{font-family:"IBM Plex Mono",monospace;font-size:.62rem;letter-spacing:.16em;color:var(--redline);margin-bottom:10px;}
  .vcell h3{font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;font-size:1.4rem;line-height:1;margin-bottom:7px;}
  .vcell p{color:var(--ink-faint);font-size:.9rem;line-height:1.4;}

  @media (min-width:880px){
    .frame{border:1px solid var(--line-steel-strong);border-radius:14px;margin:18px 0;
      min-height:calc(100vh - 67px - 36px);padding:54px 46px 0;display:flex;flex-direction:column;overflow:hidden;
      background:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px) 0 0/100% 46px,
        linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px) 0 0/46px 100%;}
    .tick{display:block;position:absolute;width:15px;height:15px;border-color:var(--redline);}
    .tick.tl{top:15px;left:15px;border-top:2px solid;border-left:2px solid;}
    .tick.tr{top:15px;right:15px;border-top:2px solid;border-right:2px solid;}
    .tick.bl{bottom:15px;left:15px;border-bottom:2px solid;border-left:2px solid;}
    .tick.br{bottom:15px;right:15px;border-bottom:2px solid;border-right:2px solid;}
    .meta{display:block;position:absolute;font-family:"IBM Plex Mono",monospace;font-size:.6rem;
      letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);}
    .meta.mtl{top:28px;left:40px;}
    .meta.mtr{top:28px;right:40px;color:var(--amber);}

    .hero{display:grid;grid-template-columns:1.12fr .88fr;gap:54px;align-items:center;flex:1;padding:12px 0 20px;}
    .kicker{margin-bottom:20px;}
    .kicker .eyebrow{font-size:.7rem;}
    .lead h1{font-size:clamp(3.4rem,5.6vw,5.6rem);line-height:.9;}
    .lead .sub{font-size:1.12rem;margin:24px 0 32px;}

    .payoff{display:block;position:relative;}
    .payoff .plabel{position:absolute;top:-26px;left:2px;font-family:"IBM Plex Mono",monospace;
      font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);}
    .payoff .samplecard{transform:rotate(-1.2deg);}

    .vstrip{grid-template-columns:repeat(3,1fr);margin-top:auto;}
    .vcell{border-bottom:none;border-right:1px solid var(--line-steel);padding:24px 26px 30px;}
    .vcell:last-child{border-right:none;}
  }

  /* ---------- buttons ---------- */
  .btn{font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    font-size:1.05rem;padding:15px 30px;border-radius:8px;border:1px solid transparent;cursor:pointer;
    -webkit-tap-highlight-color:transparent;transition:filter .15s,transform .08s,background .15s,border-color .15s;text-decoration:none;display:inline-block;}
  .btn.primary{background:var(--redline);color:#fff;}
  .btn.primary:hover{filter:brightness(1.08);}
  .btn.primary:active{transform:scale(.98);}
  .btn.ghost{background:transparent;color:var(--paper);border-color:var(--line-steel-strong);}
  .btn.ghost:hover{border-color:var(--paper);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}

  /* ---------- wizard ---------- */
  .wiz{padding:26px 0 0;}
  .prog{max-width:640px;margin:0 auto 30px;}
  .prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .prog-step{font-family:"IBM Plex Mono",monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);}
  .prog-label{font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.03em;font-size:1.05rem;color:var(--paper);}
  .prog-bar{height:4px;background:var(--steel-800);border-radius:999px;overflow:hidden;}
  .prog-fill{height:100%;background:var(--redline);border-radius:999px;transition:width .3s cubic-bezier(.22,.61,.36,1);}

  .q{max-width:720px;margin:0 auto;}
  .q h2{font-family:"Saira Condensed",sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.01em;
    font-size:clamp(1.9rem,5vw,2.7rem);line-height:1;text-align:center;}
  .q .sub{text-align:center;color:#b7bcc2;margin:12px auto 30px;max-width:40ch;font-size:.98rem;}

  /* selectable tiles */
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .tile{position:relative;background:var(--steel-850);border:1px solid var(--line-steel-strong);border-radius:12px;
    padding:20px 16px;cursor:pointer;text-align:left;color:var(--paper);transition:border-color .15s,background .15s,transform .08s;
    -webkit-tap-highlight-color:transparent;display:flex;flex-direction:column;gap:5px;min-height:92px;}
  .tile:hover{border-color:var(--line-steel-strong);background:var(--steel-800);}
  .tile:active{transform:scale(.99);}
  .tile .ico{width:34px;height:24px;margin-bottom:6px;color:var(--ink-faint);transition:color .15s;}
  .tile .t{font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.02em;font-size:1.15rem;}
  .tile .d{font-size:.82rem;color:var(--ink-faint);line-height:1.3;}
  .tile.on{border-color:var(--redline);background:rgba(216,58,41,.10);}
  .tile.on .ico{color:var(--redline);}
  .tile:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
  .tile .rank{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;background:var(--redline);color:#fff;
    font-family:"Saira Condensed",sans-serif;font-weight:800;font-size:.95rem;display:none;align-items:center;justify-content:center;}
  .tile.on .rank{display:flex;}

  /* segmented controls (prefs) */
  .field{margin-bottom:24px;}
  .field > label{display:block;font-family:"IBM Plex Mono",monospace;font-size:.62rem;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px;}
  .seg{display:flex;flex-wrap:wrap;gap:8px;}
  .seg button{flex:1 1 auto;min-width:88px;min-height:44px;font-family:"IBM Plex Sans",system-ui,sans-serif;font-weight:600;font-size:.9rem;
    padding:12px 10px;border-radius:8px;border:1px solid var(--line-steel-strong);background:var(--steel-850);color:#c8c4ba;
    cursor:pointer;-webkit-tap-highlight-color:transparent;transition:.15s;}
  .seg button:hover{color:var(--paper);}
  .seg button.on{background:var(--redline);border-color:var(--redline);color:#fff;}
  .seg button:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}

  .wiz-nav{max-width:720px;margin:36px auto 0;display:flex;justify-content:space-between;gap:12px;}

  /* ---------- results ---------- */
  .res-head{text-align:center;padding:20px 0 26px;}
  .res-head .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);}
  .res-head h2{font-family:"Saira Condensed",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(2rem,5vw,3rem);line-height:1;margin-top:8px;}
  .res-note{max-width:60ch;margin:12px auto 0;color:var(--ink-faint);font-size:.86rem;font-family:"IBM Plex Mono",monospace;}

  .card{background:var(--paper);color:var(--ink);border-radius:14px;overflow:hidden;border:1px solid var(--paper-edge);
    box-shadow:0 20px 50px -28px rgba(0,0,0,.7);}
  .top-pick{margin-bottom:20px;}
  .top-pick .flag{background:var(--redline);color:#fff;font-family:"IBM Plex Mono",monospace;font-size:.6rem;letter-spacing:.18em;
    text-transform:uppercase;font-weight:600;padding:7px 16px;}
  .pick-body{display:grid;grid-template-columns:1.1fr 1fr;gap:0;}
  .pick-visual{background:linear-gradient(160deg,#2a3138,#171a1e);display:flex;align-items:center;justify-content:center;padding:26px;min-height:190px;}
  .pick-visual svg{width:80%;max-width:280px;height:auto;color:#aeb4bb;}
  .pick-info{padding:22px 24px;}
  .pick-info .ey{font-family:"IBM Plex Mono",monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);}
  .pick-info h3{font-family:"Saira Condensed",sans-serif;font-weight:800;text-transform:uppercase;font-size:2rem;line-height:1;margin:4px 0 6px;}
  .match-badge{display:inline-flex;align-items:baseline;gap:6px;background:var(--ink);color:var(--paper);border-radius:999px;padding:5px 13px;margin-bottom:12px;}
  .match-badge b{font-family:"Saira Condensed",sans-serif;font-weight:800;font-size:1.15rem;}
  .match-badge span{font-family:"IBM Plex Mono",monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;}
  .why{display:flex;flex-wrap:wrap;gap:7px;margin:2px 0 14px;}
  .why span{font-family:"IBM Plex Mono",monospace;font-size:.64rem;letter-spacing:.06em;text-transform:uppercase;font-weight:600;
    color:#8a5a00;background:#fbf3df;border:1px solid #efd9a6;border-radius:999px;padding:5px 11px;}
  .blurb{color:#3a3e43;font-size:.95rem;line-height:1.5;margin-bottom:16px;}
  .specs{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line);}
  .specs .s{padding:11px 12px;border-right:1px solid var(--line);}
  .specs .s:last-child{border-right:none;}
  .specs .s .k{font-family:"IBM Plex Mono",monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:3px;}
  .specs .s .v{font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:1.1rem;}
  .pick-cta{padding:18px 24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;border-top:1px solid var(--line);background:var(--paper-dim);}

  .alts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px;}
  .alt{padding:18px 18px 16px;}
  .alt .ey{font-family:"IBM Plex Mono",monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);}
  .alt h4{font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;font-size:1.35rem;line-height:1;margin:3px 0 8px;}
  .alt .altmatch{font-family:"IBM Plex Mono",monospace;font-size:.72rem;color:var(--redline-deep);font-weight:600;}
  .alt .altspec{color:var(--ink-soft);font-size:.84rem;margin-top:6px;}
  .res-foot{text-align:center;margin-top:30px;}

  /* ---------- a11y helper ---------- */
  .sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0;}

  /* ---------- step entrance motion ---------- */
  @keyframes vm-rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  .anim-rise{animation:vm-rise .34s cubic-bezier(.22,.61,.36,1) both;}

  /* ---------- loading state (results compute) ---------- */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;padding:clamp(60px,16vh,140px) 0;text-align:center;}
  .spinner{width:44px;height:44px;border-radius:50%;border:3px solid var(--line-steel-strong);
    border-top-color:var(--redline);animation:vm-spin .8s linear infinite;}
  @keyframes vm-spin{to{transform:rotate(360deg);}}
  .loading p{font-family:"IBM Plex Mono",monospace;font-size:.7rem;letter-spacing:.16em;
    text-transform:uppercase;color:var(--ink-faint);}

  /* ---------- empty / relaxed-filter note ---------- */
  .res-note{display:flex;align-items:center;gap:9px;justify-content:center;flex-wrap:wrap;
    background:var(--steel-850);border:1px solid var(--line-steel-strong);border-radius:10px;
    padding:11px 16px;max-width:none;width:fit-content;}
  .res-note::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--amber);flex:0 0 auto;}
  .res-note .widen{color:var(--paper);text-decoration:underline;text-underline-offset:2px;
    background:none;border:0;cursor:pointer;font:inherit;font-family:"IBM Plex Mono",monospace;
    padding:0;-webkit-tap-highlight-color:transparent;}
  .res-note .widen:hover{color:var(--amber);}
  .res-note .widen:focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:3px;}

  /* ---------- quote modal + form (M3) ---------- */
  .modal-backdrop{position:fixed;inset:0;z-index:60;background:rgba(12,14,17,.62);
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;
    padding:max(20px,env(safe-area-inset-top)) 16px 40px;animation:vm-fade .2s ease both;}
  @keyframes vm-fade{from{opacity:0;}to{opacity:1;}}
  .modal{position:relative;width:100%;max-width:440px;margin-top:min(9vh,90px);
    background:var(--paper);color:var(--ink);border:1px solid var(--paper-edge);border-radius:16px;
    box-shadow:0 30px 70px -30px rgba(0,0,0,.8);padding:26px 24px 22px;
    animation:vm-rise .28s cubic-bezier(.22,.61,.36,1) both;}
  .modal-x{position:absolute;top:12px;right:12px;width:36px;height:36px;border:0;background:transparent;
    color:var(--ink-soft);font-size:1.7rem;line-height:1;cursor:pointer;border-radius:8px;
    -webkit-tap-highlight-color:transparent;}
  .modal-x:hover{color:var(--ink);background:rgba(0,0,0,.05);}
  .modal-x:focus-visible{outline:2px solid var(--redline);outline-offset:2px;}
  .modal-head{margin-bottom:18px;padding-right:28px;}
  .modal-head .ey{font-family:"IBM Plex Mono",monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--redline-deep);}
  .modal-head h3{font-family:"Saira Condensed",sans-serif;font-weight:800;text-transform:uppercase;
    font-size:1.7rem;line-height:1;margin:6px 0 8px;}
  .modal-sub{color:var(--ink-soft);font-size:.9rem;line-height:1.45;}

  .form-field{margin-bottom:14px;display:flex;flex-direction:column;}
  .form-field label{font-family:"IBM Plex Mono",monospace;font-size:.6rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;}
  .form-field input,.form-field select{font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:1rem;
    color:var(--ink);background:#fff;border:1px solid var(--line-strong);border-radius:9px;
    padding:12px 13px;width:100%;min-height:46px;transition:border-color .15s,box-shadow .15s;}
  .form-field input::placeholder{color:var(--ink-faint);}
  .form-field input:focus,.form-field select:focus{outline:none;border-color:var(--redline);
    box-shadow:0 0 0 3px rgba(216,58,41,.16);}
  .form-field input[aria-invalid="true"]{border-color:var(--redline);}
  .select-wrap{position:relative;}
  .select-wrap select{appearance:none;-webkit-appearance:none;padding-right:38px;cursor:pointer;}
  .select-wrap::after{content:"";position:absolute;right:15px;top:50%;transform:translateY(-30%) rotate(45deg);
    width:8px;height:8px;border-right:2px solid var(--ink-soft);border-bottom:2px solid var(--ink-soft);pointer-events:none;}
  .field-error{color:var(--redline-deep);font-size:.78rem;margin-top:5px;min-height:1em;font-weight:500;}
  .form-error{color:var(--redline-deep);font-size:.85rem;margin:2px 0 12px;font-weight:600;}

  .btn.block{width:100%;margin-top:6px;}
  .privacy{color:var(--ink-faint);font-size:.72rem;line-height:1.4;text-align:center;margin-top:12px;}

  .quote-done{text-align:center;padding:14px 4px 6px;}
  .quote-done .check{width:58px;height:58px;margin:0 auto 14px;border-radius:50%;
    background:rgba(216,58,41,.12);color:var(--redline);display:flex;align-items:center;justify-content:center;}
  .quote-done .check svg{width:32px;height:32px;}
  .quote-done h3{font-family:"Saira Condensed",sans-serif;font-weight:800;text-transform:uppercase;
    font-size:1.6rem;line-height:1;margin-bottom:8px;outline:none;}
  .quote-done p{color:var(--ink-soft);font-size:.92rem;line-height:1.5;max-width:34ch;margin:0 auto 8px;}
  .quote-done .demo-tag{color:var(--ink-faint);font-size:.74rem;font-family:"IBM Plex Mono",monospace;margin-top:10px;}
  .quote-done .demo-tag code{background:rgba(0,0,0,.06);padding:1px 5px;border-radius:4px;}
  .quote-done .btn{margin-top:16px;color:var(--ink);border-color:var(--line-strong);}
  .quote-done .btn:hover{border-color:var(--ink);}

  @media (max-width:620px){
    .pick-body{grid-template-columns:1fr;}
    .pick-visual{min-height:150px;}
    .alts{grid-template-columns:1fr;}
  }
  @media (max-width:440px){
    .topbar-tag{display:none;}          /* keep the wordmark from wrapping on small phones */
    .wordmark span{display:none;}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;}
    .anim-rise,.modal,.modal-backdrop{animation:none!important;}
    .spinner{animation-duration:0s;border-top-color:var(--redline);}
  }
</style>
</head>
